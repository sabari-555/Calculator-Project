<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" type="image/x-icon" href="../Assets/icons8-calculator-16.png">
    <link rel="stylesheet" href="../styles/style.css"></link>

</head>

<body class="dark">
    <div class="hero">
        <div class="heading-css">
            <p class="cals-name js-cals-name">Calculator</p>
            <div class="github-logo">
                <button class="logo-btn">
                    <img id="github-img" class="logo-img" src="../Assets/github-white.svg" alt="github-icon">
                </button>
            </div>  
            <div class="dark-mode-css">
                <button class="logo-btn js-theme-delay">
                    <img id="theme-img" class="logo-img" src="../Assets/sun.svg" alt="theme-icon">
                </button>
            </div>
        </div>
            <div class="buttons-containar">

                <div class="display-result result-css result-gray js-result-toggle"></div>
                
                <button class="calculation-buttons gray-button js-delete-btn">
                    Del
                </button>
                

                <button class="calculation-buttons gray-button js-cals-button" data-value="1"
                    >1
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="2"
                    >2
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="3"
                    >3
                </button>

                <button class="calculation-buttons orange-button js-cals-button" data-value="+"
                    >+
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="4"
                    >4
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="5"
                    >5
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="6"
                    >6
                </button>

                <button class="calculation-buttons orange-button js-cals-button" data-value="-"
                    >-
                </button>
                
                <button class="calculation-buttons gray-button js-cals-button" data-value="7"
                    >7
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="8"
                    >8
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="9"
                    >9
                </button>

                <button class="calculation-buttons orange-button js-cals-button" data-value="*"
                    >*
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="0"
                    >0
                </button>

                <button class="calculation-buttons gray-button js-cals-button" data-value="."
                    >.
                </button>

                <button class="calculation-buttons gray-button equalto-js-btn"
                    >=
                </button>

                <button class="calculation-buttons orange-button js-cals-button" data-value="/"
                    >/
                </button>

                <button class="calculation-buttons gray-button js-cals-button clear-button js-clear-btn"
                    >Clear
                </button>

            </div>
        <div>
            
        </div>

    </div>
    
    <script type="module" src="../script/script.js"></script>
</body>

</html>
