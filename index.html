<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css"></link>

</head>

<body class="dark">
    <div class="hero">
        <div class="heading-css">
            <p class="cals-name js-cals-name">Calculator</p>
            <div class="github-logo">
                <button class="logo-btn">
                    <img id="github-img" class="logo-img" src="Assets/github-white.svg">
                </button>
            </div>  
            <div class="dark-mode-css">
                <button class="logo-btn" onclick="themeDelay()">
                    <img id="theme-img" class="logo-img" src="Assets/sun.svg" alt="theme-icon">
                </button>
            </div>
        </div>
        <div class="buttons-containar">

            <div class="display-result result-css result-gray js-result-toggle"></div>
            
            <button class="calculation-buttons gray-button js-delete-btn">
                Del
            </button>
            

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('1')
                ">1
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('2')
                ">2
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('3')
                ">3
            </button>

            <button class="calculation-buttons orange-button" onclick="
                updateCalculation('+')
                ">+
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('4')
                ">4
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('5')
                ">5
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('6')
                ">6</button>

            <button class="calculation-buttons orange-button" onclick="
                updateCalculation('-')
                ">-</button>
            

             <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('7')
                ">7
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('8')
                ">8</button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('9')
                ">9
            </button>

            <button class="calculation-buttons orange-button" onclick="
                updateCalculation('*')
                ">*
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('0')
                ">0
            </button>

            <button class="calculation-buttons gray-button js-cals-button" onclick="
                updateCalculation('.')
                ">.
            </button>

            <button class="calculation-buttons gray-button js-cals-button equalto-js-btn" >
                =
            </button>

            <button class="calculation-buttons orange-button" onclick="
                updateCalculation('/')
                ">/
            </button>

            <button class="calculation-buttons gray-button js-cals-button clear-button js-clear-btn">
                Clear
            </button>

        </div>

        <div>
            
        </div>

    </div>
    

    <script src="script.js"></script>
</body>

</html>
